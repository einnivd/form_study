<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>입력 양식 작성하기</title>
  </head>
  <body>
    <!-- 폼을 만드는 태그 -->
     <!-- 단어 드래그 + ctrl + D : 같은 단어 동시 수정 -->
    <form>
      <!-- 기본 정보 영역 -->
      <fieldset>
        <legend>기본 정보</legend>
        <!-- 아이디 입력창 -->
        <p>
          <label for="userid">아이디</label>
          <input type="text" id="userid" />
          <!-- for 와 id 가 같아야 한다(userid) --> 
        </p>
        <!-- 비밀번호 입력창 -->
        <p>
          <label for="passwd">비밀번호</label>
          <input type="password" id="passwd" />
        </p>
      </fieldset>
      <!-- 선택 정보 영역 -->
       <fieldset>
        <legend>선택 정보</legend>
        <!-- 나이 : type - number -->
         <p>
             <label for="age">나이</label>
             <input type="number" id="age">
         </p>
        <!-- 추천인 : type - text -->
         <p>
            <label for="name">추천인</label>
            <input type="text" id="name">
         </p>
       </fieldset>
      
    </form>
  </body>
</html>
